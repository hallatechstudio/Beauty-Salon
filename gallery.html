<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery — Brushes & Clippers Salon & Spa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8D5A0;
    --black: #0D0D0D;
    --off-black: #1A1A1A;
    --cream: #F9F5EE;
    --muted: #8C8278;
    --border: rgba(201,168,76,0.2);
    --display: 'Cormorant Garamond', Georgia, serif;
    --body: 'DM Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--body);
    background: var(--black);
    color: var(--cream);
    overflow-x: hidden;
    line-height: 1.6;
  }

  header {
    padding: 4rem 2rem;
    text-align: center;
    background: var(--off-black);
    border-bottom: 0.5px solid var(--border);
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    color: var(--gold);
    text-decoration: none;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 2rem;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--gold-light); }

  h1 {
    font-family: var(--display);
    font-size: clamp(2.5rem, 5vw, 4rem);
    font-weight: 300;
    margin-bottom: 1rem;
  }
  h1 em { font-style: italic; color: var(--gold); }

  .subtitle {
    color: var(--muted);
    font-size: 1rem;
    max-width: 600px;
    margin: 0 auto;
    font-weight: 300;
  }

  .gallery-container {
    padding: 4rem 2rem;
    max-width: 1400px;
    margin: 0 auto;
  }

  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1.5rem;
  }

  .gallery-item {
    position: relative;
    aspect-ratio: 1;
    overflow: hidden;
    background: var(--off-black);
    cursor: pointer;
  }

  .gallery-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.6s ease, filter 0.4s;
    filter: brightness(0.8);
  }

  .gallery-item:hover img {
    transform: scale(1.05);
    filter: brightness(1);
  }

  .gallery-item .overlay {
    position: absolute;
    inset: 0;
    background: rgba(13,13,13,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .gallery-item:hover .overlay {
    opacity: 1;
  }

  .overlay-text {
    border: 1px solid var(--gold);
    padding: 1rem 1.5rem;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    font-size: 0.7rem;
  }

  footer {
    padding: 4rem 2rem;
    text-align: center;
    border-top: 0.5px solid var(--border);
    background: var(--off-black);
  }

  .footer-logo {
    font-family: var(--display);
    font-size: 1.5rem;
    color: var(--gold);
    margin-bottom: 1rem;
    display: block;
    text-decoration: none;
  }

  .copyright {
    font-size: 0.75rem;
    color: var(--muted);
    font-weight: 300;
  }

  /* Modal/Lightbox logic could be added here, but for now, simple grid is good */

  @media (max-width: 768px) {
    header { padding: 3rem 1.5rem; }
    .gallery-container { padding: 2rem 1rem; }
    .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1rem; }
  }
</style>
</head>
<body>

<header>
  <a href="index.html" class="back-link">← Back to Home</a>
  <h1>Our <em>Gallery</em></h1>
  <p class="subtitle">A showcase of artistry, style, and the transformations that define the Brushes & Clippers experience.</p>
</header>

<main class="gallery-container">
  <div class="gallery-grid">
    <div class="gallery-item">
      <img src="11.jpeg" alt="Beauty Transformation">
      <div class="overlay"><span class="overlay-text">View Work</span></div>
    </div>
    <div class="gallery-item">
      <img src="22.jpeg" alt="Beauty Transformation">
      <div class="overlay"><span class="overlay-text">View Work</span></div>
    </div>
    <div class="gallery-item">
      <img src="33.jpeg" alt="Beauty Transformation">
      <div class="overlay"><span class="overlay-text">View Work</span></div>
    </div>
    <div class="gallery-item">
      <img src="444.jpeg" alt="Beauty Transformation">
      <div class="overlay"><span class="overlay-text">View Work</span></div>
    </div>
    <div class="gallery-item">
      <img src="555.jpeg" alt="Beauty Transformation">
      <div class="overlay"><span class="overlay-text">View Work</span></div>
    </div>
    <div class="gallery-item">
      <img src="666.jpeg" alt="Beauty Transformation">
      <div class="overlay"><span class="overlay-text">View Work</span></div>
    </div>
    <div class="gallery-item">
      <img src="777.jpeg" alt="Beauty Transformation">
      <div class="overlay"><span class="overlay-text">View Work</span></div>
    </div>
  </div>
</main>

<footer>
  <a href="index.html" class="footer-logo">Brushes & Clippers</a>
  <p class="copyright">© 2025 Brushes & Clippers Salon & Spa. All rights reserved.</p>
</footer>

</body>
</html>
